<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — চ্যাট অ্যাপ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-screen">
    <form class="auth-card" id="signupForm" novalidate>
      <div class="auth-card__logo">চ্যাট</div>
      <h1>অ্যাকাউন্ট তৈরি করুন</h1>
      <p class="auth-card__sub">শুরু করতে নিচের তথ্য দিন</p>

      <div class="avatar-upload">
        <label class="avatar-upload__preview" id="avatarPreview" for="avatarInput">
          <span id="avatarPlaceholder">ছবি<br>আপলোড করুন *</span>
        </label>
        <input type="file" id="avatarInput" accept="image/*" hidden required>
        <div class="field__error" id="avatarError"></div>
      </div>

      <div class="field">
        <label for="name">নাম *</label>
        <input type="text" id="name" placeholder="আপনার পূর্ণ নাম" required>
        <div class="field__error" id="nameError"></div>
      </div>

      <div class="field">
        <label for="mobile">মোবাইল নম্বর *</label>
        <input type="tel" id="mobile" placeholder="01XXXXXXXXX" required>
        <div class="field__error" id="mobileError"></div>
      </div>

      <div class="field">
        <label for="email">ইমেইল (ঐচ্ছিক)</label>
        <input type="email" id="email" placeholder="you@example.com">
        <div class="field__error" id="emailError"></div>
      </div>

      <div class="field">
        <label for="password">পাসওয়ার্ড *</label>
        <input type="password" id="password" placeholder="কমপক্ষে ৬ ক্যারেক্টার, অক্ষর ও সংখ্যা" required>
        <div class="field__error" id="passwordError"></div>
      </div>

      <div class="field">
        <label for="confirmPassword">পাসওয়ার্ড নিশ্চিত করুন *</label>
        <input type="password" id="confirmPassword" required>
        <div class="field__error" id="confirmPasswordError"></div>
      </div>

      <div class="field">
        <label>ক্যাপচা যাচাই *</label>
        <div class="captcha-box">
          <canvas id="captchaCanvas" width="150" height="46"></canvas>
          <button type="button" class="btn--icon" id="refreshCaptcha" title="Refresh">↻</button>
        </div>
        <input type="text" id="captchaInput" placeholder="উপরের কোডটি লিখুন" required>
        <div class="field__error" id="captchaError"></div>
      </div>

      <button type="submit" class="btn" id="signupBtn">সাইন আপ করুন</button>

      <div class="auth-card__footer">
        ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a>
      </div>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/cloudinary-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
