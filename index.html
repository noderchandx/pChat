<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>চ্যাট অ্যাপ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="global-loader" class="loader--show"><div class="spinner"></div></div>

  <!-- Firebase SDK (compat, no build step needed — GitHub Pages friendly) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    // লগইন অবস্থা চেক করে সঠিক পেজে পাঠানো হচ্ছে
    auth.onAuthStateChanged((user) => {
      window.location.replace(user ? "chat.html" : "login.html");
    });
  </script>
</body>
</html>
